<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PyGround{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <div class="container">
            <h1>🐍 PyGround</h1>
            <p class="subtitle">Practice Web Tools Collection</p>
        </div>
    </header>
    
    <nav>
        <div class="container">
            <a href="/">Home</a>
        </div>
    </nav>
    
    <main>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
    
    <footer>
        <div class="container">
            <p>&copy; 2024 PyGround - Built with Flask & Python</p>
        </div>
    </footer>
</body>
</html>
